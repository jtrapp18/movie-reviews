# Repo-root config for pre-commit / Black / Ruff (backend).
# Server package config remains in server/pyproject.toml.

[tool.black]
line-length = 88
target-version = ["py38", "py39", "py310", "py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.eggs
  | \.git
  | \.mypy_cache
  | server/migrations
)/
'''

[tool.ruff]
line-length = 88
target-version = "py38"
exclude = [".eggs", ".git", "server/migrations"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # Pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
]
ignore = ["E501"]  # line too long (black handles it)
