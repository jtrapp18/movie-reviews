# Pre-commit hooks: https://pre-commit.com
# Install: pip install -r requirements-dev.txt && pre-commit install
# Run manually: pre-commit run --all-files
#
# This config starts with backend (Python) only. Add frontend (ESLint, Prettier) in a later commit.

default_language_version:
  python: python3

repos:
  # General-purpose hooks (trailing whitespace, YAML/JSON, large files, etc.)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --- Backend (Python) ---
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: black (format)
        files: ^server/
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        name: ruff (lint)
        files: ^server/
        args: [--fix]

  # Secret detection: fails if new secrets appear. Excludes migrations (revision IDs),
  # build artifacts, and lockfiles. To allowlist more: detect-secrets scan --update .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "package-lock\\.json|\\.secrets\\.baseline|server/migrations/|client/\\.vite/|client/node_modules/"

  # --- Frontend (JS/JSX only; no TS) ---
  # Prettier and ESLint run from client/ using project's node_modules (local hooks).
  - repo: local
    hooks:
      - id: prettier
        name: prettier (client)
        entry: bash -c 'cd client && files=(); for f in "$@"; do r="${f#client/}"; case "$r" in *.js|*.jsx|*.css|*.scss|*.json|*.md|*.html|*.yaml|*.yml) [ -f "$r" ] && files+=("$r");; esac; done; [ ${#files[@]} -eq 0 ] || npx prettier --write "${files[@]}"'
        language: system
        files: ^client/
        pass_filenames: true
        exclude: "client/(dist|node_modules|\\.vite)/"

      - id: eslint
        name: eslint (client)
        entry: bash -c 'cd client && npx eslint . --max-warnings 0'
        language: system
        files: ^client/
        pass_filenames: false
