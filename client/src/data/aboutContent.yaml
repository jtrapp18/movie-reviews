header:
  title: 'About James'
  subtitle: 'Film Enthusiest and Critic'

aboutJames:
  personalStory: |
    James was born in Ontario, Canada and lived there with his parents and three
    younger siblings until shortly after his 7th birthday when his family moved to the
    U.S.

    James developed a love of movies as a kid, watching everything from Adam
    Sandler comedies to franchise horror movies to Martin Scorsese crime sagas.

    As a kid he would go into Blockbuster stores (remember those) with his siblings
    and spend a ridiculous amount of time going through the aisles before leaving
    with a handful of movies. James loved nothing more than family movie nights
    which included bowls of hot popcorn and an ice cold soda.

    His interest in movies expanded gradually over time but was taken to another
    level around 2016 after reading one of Roger Ebert’s reviews which referenced
    the French film Breathless (1960). After watching it, he got his hands on every
    French New Wave film he could find at the local libraries. His interest in
    international cinema skyrocketed from there and has not let up since.

    His favorite filmmakers include Martin Scorsese, Alfred Hitchcock, Akira
    Kurosawa, Stanley Kubrick, Terence Malick, Jean Pierre Melville, Quentin
    Tarantino, David Fincher, and Park Chan-wook, among others.

  criticismLine: |
    His approach to film criticism combines a mix of academic analysis and personal reflection, with an accessible writing style that makes complex cinematic concepts engaging for all readers.

  closing: |
    Even with an interest in more serious filmmakers, he still loves a hilarious “so
    bad its good movie” like Mr. Brooks (2007) or Taken (2008) every once in a while.

