grading:
  title: "James Trapp's Grading System in Tiers"

  intro: |
    The table below is a grading system I use to categorize the quality of films. I understand the appeal
    of a simple “thumbs up” vs “thumbs down” approach for a casual viewer. I can also see why
    some might prefer a broader grading system with anything from a 0-10 scale or even going as far as using a 0-100 scale.
    I prefer to use categories or Tiers.

  systemTitle: 'From Magnum Opus to Unredeemable'

  table:
    headers:
      - 'Grade'
      - 'Tier'
      - 'Definition'

  notes: |
    Keep in mind that the exact number of Masterpieces or Magnum Opus level films
    might be higher or lower than the number in the above table. These numbers are an approximation as there might be a few more or a few less than 300 Masterpieces. Similarly, there might be a few more or a few less than 75 Magnum Opus Level Films. Learning about Cinema is an evolving process so none of this is set in stone but I do like having a starting point to work with.

    These gradings are intended as objective rankings. Some people may not distinguish between “objectively best” and “favorite” as they view them as one in the same. I take no issue with this, but for me personally, I do distinguish between the two.
